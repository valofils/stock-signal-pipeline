name: Daily Stock Signal Pipeline

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run pipeline
        run: |
          python src/stock_signal/run_pipeline.py

      - name: Commit and push report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results/reports/ data/processed/features_latest.parquet data/raw/ohlcv_latest.parquet
          git diff --staged --quiet || git commit -m "chore: daily signal report $(date +'%Y-%m-%d')"
          git push
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
